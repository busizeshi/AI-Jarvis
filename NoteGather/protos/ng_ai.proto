// 拾笺 NoteGather · Java ↔ Python AI 服务 gRPC 契约
// 统一同源：Java 从此文件生成存根，Python 通过 grpc_tools 生成 pb 代码。
syntax = "proto3";

package ngai;

option java_multiple_files = true;
option java_package = "com.notegather.grpc.ai";
option java_outer_classname = "NgAiProto";

// ==================== 文档解析服务 ====================
// Java module-ai / module-file 主动查询解析状态
service ParseService {
  rpc GetParseStatus (ParseStatusRequest) returns (ParseStatusResponse);
}

// ==================== 检索问答服务 ====================
// Java module-ai 发起 RAG 问答，Python 流式返回 token 片段
service ChatService {
  rpc Chat (ChatRequest) returns (stream ChatChunk);
}

// -------------------- 消息体 --------------------

message ParseStatusRequest {
  string file_id = 1;
}

message ParseStatusResponse {
  string file_id     = 1;
  string status      = 2;  // PENDING / PROCESSING / DONE / FAILED
  int32  chunk_count = 3;
  string error_msg   = 4;
}

message ChatRequest {
  string user_id  = 1;
  string question = 2;
  int32  top_k    = 3;  // 检索召回条数，默认 5
}

message ChatChunk {
  string content            = 1;  // token 片段
  bool   is_done            = 2;
  repeated Citation citations = 3;  // 仅在 is_done=true 时填充
}

message Citation {
  string note_id    = 1;
  string note_title = 2;
  string chunk_text = 3;
  float  score      = 4;
}
