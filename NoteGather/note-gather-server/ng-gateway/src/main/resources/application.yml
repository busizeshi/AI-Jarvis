server:
  port: 9000
  shutdown: graceful

spring:
  application:
    name: ng-gateway
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          min-idle: 2
          max-idle: 10
          max-active: 20
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
    gateway:
      discovery:
        locator:
          enabled: true              # 开启基于 Nacos 服务名的自动路由（开发期方便）
          lower-case-service-id: true
      routes:
        - id: ng-biz
          uri: lb://ng-biz
          predicates:
            - Path=/api/v1/**
          filters:
            - StripPrefix=0
        - id: ng-admin
          uri: lb://ng-admin
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=0
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

# 鉴权白名单（不校验 Token 的路径）
ng:
  security:
    jwt:
      secret: ${JWT_SECRET:NoteGatherDefaultSecretKeyForDevelopmentOnly2024}
      access-token-expire-ms: 7200000
      refresh-token-expire-ms: 2592000000
    white-list:
      - /api/v1/user/register
      - /api/v1/user/login
      - /api/v1/user/refresh-token
      - /actuator/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.notegather: DEBUG
    org.springframework.cloud.gateway: INFO
