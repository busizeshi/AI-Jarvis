version: '3.8'

# й–№еі°еўҪйЎ‘?NoteGather з’ә?й–әе «еүҷе©Җжқ‘оҮЈйҲ§о„„еҙЈйҺҙж»ҶеҺ¬й—ӮеӮңз№қеЁҶгҲӨжӮійЎ–ж°јжҡ”
# й–ёв•„ж«ЈйЎўе‘ҙжӮійЎ–ж°јжҡ”й–ҝж¶ҷз“ӯd deploy && docker compose up -d
# зјҒжҘҠе…ӣз»—дҫҖжўјй‘ёж®ҝе”Ҫ Relay / Agentй–ҝж¶ҷз“°ocker compose --profile phase3 up -d
# й–ёе¬«зІҚйЎ’ж¶ўеҙЁйҺҙжҺ“е§ўй–ҝж¶ҷз“°ocker compose down
# жҝһж’іжҮҳеЁ…еәЁеј«йҗ—е қзҘҰй–ҝж¶ҷз“°ocker compose down -v

services:

  # ============ Web еҰӨзҠІжң¬йҸҒеңӯвӮ¬е№ҝеһәйҚ©ж¶ҡзІ©?============
  web:
    build:
      context: ../note-gather-web
    container_name: ng-web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      API_BASE_URL: http://localhost:9003
      APP_ENVIRONMENT: local-compose
      APP_RELEASE: m9
      REQUEST_TIMEOUT_MS: "10000"
      GRAPH_POLL_MAX_ATTEMPTS: "40"
      FEATURE_GRAPH: "true"
      FEATURE_BACKLINKS: "true"
      FEATURE_CHAT: "true"
      FEATURE_FLASHCARDS: "true"
      FEATURE_AI_FLASHCARDS: "true"
      FEATURE_COLLABORATION: ${FEATURE_COLLABORATION:-false}
      FEATURE_NOTIFICATIONS: ${FEATURE_NOTIFICATIONS:-false}
      FEATURE_COLLAB_REALTIME: ${FEATURE_COLLAB_REALTIME:-false}
      FEATURE_WORKFLOW: ${FEATURE_WORKFLOW:-false}

  ai-service:
    build:
      context: ../note-gather-ai
    container_name: ng-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../note-gather-ai/.env
    environment:
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_DISABLE_XET: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rocketmq-broker:
        condition: service_started
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      minio:
        condition: service_started
  collab-realtime:
    profiles: ["phase3"]
    build:
      context: ../note-gather-collab/collab-realtime
    container_name: ng-collab-realtime
    restart: unless-stopped
    ports:
      - "1235:1235"
    environment:
      COLLAB_REALTIME_PORT: "1235"
      COLLAB_REALTIME_AUTH_BASE_URL: ${COLLAB_REALTIME_AUTH_BASE_URL:-http://host.docker.internal:9003}
      COLLAB_REALTIME_SERVICE_TOKEN: ${COLLAB_REALTIME_SERVICE_TOKEN:-}
      COLLAB_MYSQL_HOST: mysql
      COLLAB_MYSQL_PORT: "3306"
      COLLAB_MYSQL_DATABASE: notegather
      COLLAB_MYSQL_USER: root
      COLLAB_MYSQL_PASSWORD: root123456
      COLLAB_ALLOWED_ORIGINS: ${COLLAB_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy

  # ============ MySQL 8.0 ============
  mysql:
    image: mysql:8.0
    container_name: ng-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: notegather
      MYSQL_USER: ng
      MYSQL_PASSWORD: ng123456
      MYSQL_ROOT_PASSWORD: root123456
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d   # й–ёж°јеһ°жҝ®в•…еј®йҺҜжқҝж®°й–ёж–»еҠҚжҫ§з•ҢжӮ°?init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ Redis 7 ============
  # еЁ‘ж’іжө·йҸҒж’ҙзҰҚиӨҺе©Җеӣ¬еҙқйҲҘиҷ«зҸӨ 115.190.125.94 еЁ‘ж’ҜеҒ“й–јз–ҜжҸӘз»ұзүҲеҜјйҗҳз”өеҹ йҗҺйқӣжЈӣйҗ–ж»ғОҹйҲҘеҙҮзЎҖй–ҝж¶ҳжҪ·assword=rootй–ҝж¶ҳоҷҖз»ұжҝҮзЁүе®Ҙе‘®е„ҷй–»?ACLй–ө?
  # common.yaml еЁ‘ж“ғеҺјиӨ°СҮжҹҠ?passwordй–ҝж¶ҳеҘ”з»—еӨҗжҹҠ?usernameй–ҝж¶ҳиӢҜйҺҜдҫҖеҙҡ?Spring Data Redis еЁҙе…јдҝәй“”?ACL йҗ дҪөеҖӣйҗҰеӨӢжҪ»йҸӮжҢҺзӨҖ WRONGPASSй–ө?
  redis:
    image: redis:7-alpine
    container_name: ng-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "root"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a root ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ MinIOй–ҝж¶ҳзүҶйЎ•оҶҫжҢ’йҲҘеҙҮж‘ й–ёеІҠз…үз»ұ?===========
  # жҝһеӨҲеҠҚйҚ“дјҙж•Қе§ҳо…ҹжӢұй–ёпёҝеҚійҚҺеҜёзҙ”й‘јо„ҒжҡҸ 9100/9101 й—Ғо„ҖзҒқйҚҳгӮҶзЁүжҗҙпҪҮз§№й–ё?9000 й–ёж„Ҝе°ҷйҗӣе©Үж•Қ?
  # й–»гҲўе–ҚжҘ еӣ¬ејөе®Ҙе‘ӯоқӨй–ё?192.168.1.12 еЁ‘ж’іп№ҰеЁҲ?MinIO й–»в•Ғз“Ёз”Ҝж’®жғ„йҺҙжҝҮе„” 9000/9001й–ҝж¶ҳиӢҜйҚӨзҶје№‘йЎ”жҳҸзӨӢ root/qdrantroot
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: ng-minio
    restart: unless-stopped
    ports:
      - "9100:9000"   # API зјҒж—‘еһ°иӨ°ж¶ўж•ҚйҚ«жҝҗе•ҸеЁ‘ж’¶зІҜе©§вӮ¬ 9100 й–і?йҗҺеңӯжҮ“еЁ…?9000й–ҝ?
      - "9101:9001"   # Console зјҒж—‘еһ°иӨ°?
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: qdrantroot
      TZ: Asia/Shanghai
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ============ Qdrantй–ҝж¶ҳзүҶйҺ®ж»ҲжҹҢи№Үж—Җж®¶й–№иҜЎе––з»ЁйҒҚж•Қ?===========
  qdrant:
    image: qdrant/qdrant:v1.9.7
    container_name: ng-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      TZ: Asia/Shanghai

  # ============ Neo4j 5.xй–ҝж¶ҳзүҸйҗ“пј„жӢ йҚЎжҘҒзҰҲйҗ е¬«е”»з»ұ?===========
  neo4j:
    image: neo4j:5.26.12-community
    container_name: ng-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/notegather123
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      TZ: Asia/Shanghai
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ============ RocketMQ 5.x NameServer ============
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: ng-rocketmq-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
      TZ: Asia/Shanghai
    volumes:
      - rocketmq_namesrv_logs:/home/rocketmq/logs
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9876 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ RocketMQ 5.x Broker ============
  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: ng-rocketmq-broker
    restart: unless-stopped
    ports:
      - "10911:10911"
      - "10912:10912"
      - "10909:10909"
    command: sh /home/rocketmq/conf/start-broker.sh
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
      ROCKETMQ_BROKER_IP: ${ROCKETMQ_BROKER_IP:-192.168.1.12}
      TZ: Asia/Shanghai
    volumes:
      - ./rocketmq/broker.conf:/home/rocketmq/conf/broker.conf:ro
      - ./rocketmq/start-broker.sh:/home/rocketmq/conf/start-broker.sh:ro
      - rocketmq_broker_logs:/home/rocketmq/logs
      - rocketmq_broker_store:/home/rocketmq/store
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "sh mqadmin clusterList -n rocketmq-namesrv:9876 | grep -q broker-a"]
      interval: 10s
      timeout: 5s
      retries: 12

  rocketmq-topic-init:
    image: apache/rocketmq:5.1.4
    container_name: ng-rocketmq-topic-init
    restart: "no"
    command:
      - sh
      - -c
      - |
        for topic in NG_FILE_TOPIC NG_GRAPH_TOPIC NG_FLASHCARD_TOPIC NG_WORKFLOW_TOPIC; do
          sh mqadmin updateTopic -n rocketmq-namesrv:9876 -c DefaultCluster -t "$$topic"
        done
    depends_on:
      rocketmq-broker:
        condition: service_healthy

  # ============ RocketMQ Dashboardй–ҝж¶ҳзүҶиӨ°жҹҘжҹ…жҫ¶ж¶ҡзӨүй–әеӮһвӮ¬ж¶ҡв”’й–әеұ»е„іе©Җе‘ӯвҳүйҚ«зҶ¶зҙ–й–ҝ?===========
  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: ng-rocketmq-dashboard
    restart: unless-stopped
    ports:
      - "8180:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
      TZ: Asia/Shanghai
    depends_on:
      - rocketmq-namesrv
      - rocketmq-broker

  # ============ Nacos 2.xй–ҝж¶ҳзүҠе©Җеӣ¬еҙқйҲ©еҶ©жҡҲй–ё?+ й—Ғжқҝз§¶йҗӨе—ҳзЁүйЎ“зӮөеҰҮй–ҝ?===========
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: ng-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"   # gRPC йҗҺе№ҝеһәйҚ©ж¶ҡзІ©йЎ–жҝҗеҡһжҝ®з‘°еҖ»йЎҸо„„еҙЈ?
      - "9849:9849"   # gRPC й–әе қз§ҙжҝ®зҶәзІ©йЎ–жҝҗеҡһжҝ®з‘°еҖ»йЎҸо„„еҙЈ?
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      TZ: Asia/Shanghai
      JVM_XMS: 256m
      JVM_XMX: 256m
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

# ============ й–№й•җжӨ’з» ж¬“еҙ йҸҚСғзҘ№ ============
volumes:
  mysql_data:
  redis_data:
  minio_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  rocketmq_namesrv_logs:
  rocketmq_broker_logs:
  rocketmq_broker_store:
  nacos_data:
