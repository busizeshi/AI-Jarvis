# 开发环境覆盖配置（本地开发无需 Nacos，直接读 application.yml 中的配置）
spring:
  cloud:
    nacos:
      config:
        # 开发期可设 enabled=false，禁用 Nacos 配置中心，走本地 application.yml
        enabled: ${NACOS_CONFIG_ENABLED:false}
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        # 开发期服务注册可选关闭（单服务调试时）
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
