server:
  port: 9001
  shutdown: graceful
  servlet:
    context-path: /

spring:
  application:
    name: ng-biz
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml

  # 数据源（Druid + PostgreSQL）
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:notegather}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
      username: ${PG_USER:ng}
      password: ${PG_PASSWORD:ng123456}
      driver-class-name: org.postgresql.Driver
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      filters: stat,wall
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: druid
        login-password: ${DRUID_PASSWORD:druid123}
        reset-enable: false

  # Redis（Redisson 自动识别）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          min-idle: 2
          max-idle: 10
          max-active: 20

  # 文件上传限制
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

# RocketMQ
rocketmq:
  name-server: ${ROCKETMQ_ADDR:localhost:9876}
  producer:
    group: ng-biz-producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
  consumer:
    group: ng-biz-file-group

# Dubbo（服务提供方）
dubbo:
  application:
    name: ${spring.application.name}
  registry:
    address: nacos://${NACOS_ADDR:localhost:8848}
    protocol: nacos
  protocol:
    name: dubbo
    port: -1       # -1 表示自动选择端口
  scan:
    base-packages: com.notegather

# MinIO
ng:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:notegather}
  security:
    jwt:
      secret: ${JWT_SECRET:NoteGatherDefaultSecretKeyForDevelopmentOnly2024}
  grpc:
    ai:
      parse-host: ${AI_PARSE_HOST:localhost}
      parse-port: ${AI_PARSE_PORT:50051}
      search-host: ${AI_SEARCH_HOST:localhost}
      search-port: ${AI_SEARCH_PORT:50052}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.notegather: DEBUG
    com.alibaba.druid: WARN
