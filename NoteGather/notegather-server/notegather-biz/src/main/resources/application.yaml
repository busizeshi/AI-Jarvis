server:
  port: 8080

spring:
  application:
    name: notegather-biz
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  config:servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  config:
    import:
      - optional:nacos:notegather-biz.yaml
      - optional:nacos:common.yaml
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.1.12:8848
        namespace: dev
        username: nacos
        password: nacos
      config:
        server-addr: 192.168.1.12:8848
        namespace: dev
        username: nacos
        password: nacos
        file-extension: yaml
        shared-configs:
          - data-id: common.yaml
            refresh: true

# Knife4j API 文档
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  group-configs:
    - group: default
      paths-to-match: /api/**
      packages-to-scan: com.notegather.biz.interfaces.rest

knife4j:
  enable: true
  setting:
    language: zh_cn

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true
