server:
  port: 9001
  shutdown: graceful
  servlet:
    context-path: /

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      url: jdbc:mysql://115.190.125.94:3306/notegather?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root
      password: JWDdmm@2552
      driver-class-name: com.mysql.cj.jdbc.Driver
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      filters: stat,wall
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: druid
        login-password: root
        reset-enable: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

rocketmq:
  name-server: 10.142.244.123:9876
  producer:
    group: ng-biz-producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
  consumer:
    group: ng-biz-file-group

dubbo:
  application:
    name: ng-biz
  registry:
    address: nacos://10.142.244.123:8848
    protocol: nacos
    username: nacos
    password: nacos
    check: false
  protocol:
    name: dubbo
    port: -1
  provider:
    register: true
  consumer:
    check: false
  scan:
    base-packages: com.notegather

ng:
  file:
    max-size-bytes: 52428800
  minio:
    endpoint: http://10.142.244.123:9000
    access-key: root
    secret-key: qdrantroot
    bucket: notegather
  grpc:
    ai:
      parse-host: localhost
      parse-port: 50051
      search-host: localhost
      search-port: 50052

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.notegather: DEBUG
    com.alibaba.druid: WARN
