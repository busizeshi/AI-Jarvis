server:
  port: 9002
  shutdown: graceful

spring:
  application:
    name: ng-admin
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:notegather}?serverTimezone=Asia/Shanghai
      username: ${PG_USER:ng}
      password: ${PG_PASSWORD:ng123456}
      driver-class-name: org.postgresql.Driver
      initial-size: 3
      min-idle: 3
      max-active: 10

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 1         # admin 使用独立 database 隔离
      timeout: 3000ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: assign_id

dubbo:
  application:
    name: ${spring.application.name}
  registry:
    address: nacos://${NACOS_ADDR:localhost:8848}
    protocol: nacos
  protocol:
    name: dubbo
    port: -1
  scan:
    base-packages: com.notegather

ng:
  security:
    jwt:
      secret: ${JWT_SECRET:NoteGatherDefaultSecretKeyForDevelopmentOnly2024}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.notegather: DEBUG
