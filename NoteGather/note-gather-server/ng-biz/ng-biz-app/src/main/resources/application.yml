# Runtime configuration is managed by Nacos.
# See docs/nacos/common.yaml and docs/nacos/ng-biz.yaml.
spring:
  application:
    name: ng-biz
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import:
      - optional:nacos:common.yaml?group=COMMON_GROUP&refreshEnabled=false
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_ADDR:10.142.244.123:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
        file-extension: yaml
      discovery:
        server-addr: ${NACOS_ADDR:10.142.244.123:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
