# Runtime configuration is managed by Nacos.
# See docs/nacos/common.yaml and docs/nacos/ng-admin.yaml.
spring:
  application:
    name: ng-admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_ADDR:192.168.1.12:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: DEFAULT_GROUP
        file-extension: yaml
      discovery:
        server-addr: ${NACOS_ADDR:192.168.1.12:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_DISCOVERY_GROUP:HTTP_GROUP}
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
  config:
    import:
      - nacos:common.yaml?group=COMMON_GROUP&refreshEnabled=false
      - nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP
